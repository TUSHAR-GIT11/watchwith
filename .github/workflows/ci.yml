name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: watchwith/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: watchwith

      - name: Type check
        run: npx tsc --noEmit
        working-directory: watchwith

      - name: Build Next.js
        run: npm run build
        working-directory: watchwith

  docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
        working-directory: watchwith
