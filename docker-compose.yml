version: '3.8'

services: 
  frontend:
    build:
     context: .
     dockerfile: Dockerfile
    ports:
     - "3001:3000"
    environment:
     - NEXT_PUBLIC_SOCKET_URL=http://localhost:3002
    depends_on:
     - socket


  socket: 
    build:
      context: .
      dockerfile: Dockerfile.socket
    ports:
      - "3002:3002"
